<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portafolio de Logos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎨 Mi Galería de Logos</h1>
  <p>Diseños creados por mí</p>
</header>

<main id="gallery">

  <!-- Ejemplo de logo -->
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="logo">

    <div class="buttons">
      <button onclick="like(this)">👍 <span>0</span></button>
      <button onclick="dislike(this)">👎 <span>0</span></button>
      <button onclick="download()">⬇️ Descargar</button>
    </div>

    <small>👀 Vistas: <span class="views">0</span></small>
  </div>

</main>

<script src="app.js"></script>

</body>
      </html>
